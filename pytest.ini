[pytest]
# Pytest configuration

# Minimum version
minversion = 7.0

# Test paths
testpaths = tests

# Python files pattern
python_files = test_*.py

# Python classes pattern  
python_classes = Test*

# Python functions pattern
python_functions = test_*

# Add options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers
markers =
    unit: Unit tests that don't require external services
    integration: Integration tests that require OPA server or other services
    slow: Slow running tests
    security: Security-focused tests
    policies: Policy-specific tests
    validation: Input validation tests
    filtering: Output filtering tests
    end_to_end: End-to-end execution tests

# Coverage options
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
